# Production deploy. Two-stage:
#   1. `verify` re-runs the same lint/typecheck/build that CI runs on PRs.
#      This is the gate — nothing past this point happens unless the branch
#      is green.
#   2. `deploy` builds the image, pushes it to GHCR pinned to the commit SHA,
#      then SSHes into Hetzner, runs `prisma migrate deploy`, brings the new
#      container up, polls /api/health, and rolls back if it fails.
name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one production deploy may run at a time, and a newer push supersedes
# the in-flight one (set cancel-in-progress: false to instead queue them).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/markwahba-git/mudita-lms

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      NEXT_TELEMETRY_DISABLED: "1"
      NEXTAUTH_SECRET: ci-placeholder-not-a-real-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Build, push, deploy
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Tie the run to the GitHub `production` environment so secrets,
    # required reviewers and deployment history are tracked there.
    environment:
      name: production
      url: https://mudita-lms.com

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          push: true
          # Tag the immutable SHA tag (used by the deploy step) plus `latest`
          # so manual `docker compose pull` on the box still works in a pinch.
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE_TAG
          # Strict-mode bash so any failure short-circuits before we declare
          # success. The script:
          #   1. Pulls the SHA-tagged image
          #   2. Records the previously-running image so we can roll back
          #   3. Runs `prisma migrate deploy` in a one-shot container against
          #      the same env file the web service uses
          #   4. Brings the new web container up
          #   5. Polls /api/health for up to 60s; rolls back on failure
          script: |
            set -euo pipefail

            cd /opt/projects/mudita-lms

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            export IMAGE_TAG="${IMAGE_TAG}"

            echo "==> Pulling ${{ env.IMAGE }}:${IMAGE_TAG}"
            docker pull ${{ env.IMAGE }}:${IMAGE_TAG}

            # Capture the currently-running image digest so we can roll back.
            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' \
              mudita-lms-web-1 2>/dev/null || echo "")
            echo "==> Previous image: ${PREVIOUS_IMAGE:-<none>}"

            echo "==> Running prisma migrate deploy"
            docker run --rm \
              --network mudita-lms_default \
              --env-file .env \
              ${{ env.IMAGE }}:${IMAGE_TAG} \
              npx prisma migrate deploy

            echo "==> Bringing up new web container"
            docker compose up -d --remove-orphans web

            echo "==> Waiting for /api/health to report ok"
            HEALTHY=0
            for i in $(seq 1 30); do
              if curl -fsS --max-time 3 http://127.0.0.1:3020/api/health \
                  | grep -q '"status":"ok"'; then
                HEALTHY=1
                echo "==> Health check passed on attempt $i"
                break
              fi
              sleep 2
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "!! Health check failed — rolling back"
              if [ -n "$PREVIOUS_IMAGE" ]; then
                docker tag "$PREVIOUS_IMAGE" ${{ env.IMAGE }}:rollback
                IMAGE_TAG=rollback docker compose up -d --remove-orphans web
              fi
              exit 1
            fi

            echo "==> Cleaning up dangling images"
            docker image prune -f
