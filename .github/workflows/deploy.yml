# Production deploy. Two-stage:
#   1. `verify` re-runs the same lint/typecheck/build that CI runs on PRs.
#      This is the gate — nothing past this point happens unless the branch
#      is green.
#   2. `deploy` builds the image, pushes it to GHCR pinned to the commit SHA,
#      then SSHes into Hetzner, runs `prisma migrate deploy`, brings the new
#      container up, polls /api/health, and rolls back if it fails.
name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one production deploy may run at a time, and a newer push supersedes
# the in-flight one (set cancel-in-progress: false to instead queue them).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/schulab-lms/mudita-lms

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      NEXT_TELEMETRY_DISABLED: "1"
      NEXTAUTH_SECRET: ci-placeholder-not-a-real-secret
      NEXTAUTH_URL: http://localhost:3000
      # Keep the gate build's inlined public URL in parity with the shipped image.
      NEXT_PUBLIC_APP_URL: https://schulab.com

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Build, push, deploy
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Tie the run to the GitHub `production` environment so secrets,
    # required reviewers and deployment history are tracked there.
    environment:
      name: production
      url: https://mudita-lms.com

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          # NEXT_PUBLIC_* are inlined at build time. Source from the repo/environment
          # variable NEXT_PUBLIC_APP_URL (Settings > Variables), falling back to the
          # canonical domain so a missing var never bakes localhost into the image.
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://schulab.com' }}
          # Tag the immutable SHA tag (used by the deploy step) plus `latest`
          # so manual `docker compose pull` on the box still works in a pinch.
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE_TAG
          # Strict-mode bash so any failure short-circuits before we declare
          # success. The script:
          #   1. Writes the canonical docker-compose.yml (the one from the
          #      repo at this SHA) so the server is never out of sync with
          #      what we expect IMAGE_TAG to do.
          #   2. Captures the currently-running image DIGEST (not tag) so
          #      rollback can retag the actual previous bytes.
          #   3. Pulls the SHA-tagged image.
          #   4. Runs `prisma migrate deploy` in a one-shot container against
          #      the same env file the web service uses.
          #   5. Force-recreates the web container with IMAGE_TAG=${SHA}.
          #   6. Polls /api/health for up to 60s; on failure, retags the
          #      captured digest as :rollback and force-recreates back.
          script: |
            set -euo pipefail

            cd /opt/projects/mudita-lms

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            export IMAGE_TAG="${IMAGE_TAG}"

            # Preflight: docker --env-file can't parse multi-line values.
            # Reject before we waste a pull + migrate on a .env that will
            # blow up with "variable '…' contains whitespaces". Valid lines
            # are blank, comments (#…), or NAME=VALUE where NAME is an
            # identifier. Anything else means a value wrapped to a new line.
            echo "==> Validating .env has no multi-line values"
            if ! awk '
              /^[[:space:]]*$/ { next }
              /^[[:space:]]*#/ { next }
              /^[A-Za-z_][A-Za-z0-9_]*=/ { next }
              { print "invalid .env line " NR ": " $0; bad=1 }
              END { exit bad ? 1 : 0 }
            ' .env; then
              echo "!! .env contains multi-line or malformed entries."
              echo "!! Fix: put each value on one line. For PEM keys use"
              echo "!!      literal \\n separators (see .env.example)."
              exit 1
            fi

            echo "==> Writing docker-compose.yml (synced from repo @ ${IMAGE_TAG})"
            cat > docker-compose.yml <<'COMPOSE_EOF'
            services:
              postgres:
                image: postgres:15-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_USER: ${DB_USER}
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                  POSTGRES_DB: ${DB_NAME}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              web:
                image: ghcr.io/schulab-lms/mudita-lms:${IMAGE_TAG:-latest}
                restart: unless-stopped
                ports:
                  - "127.0.0.1:3020:3000"
                env_file: .env
                depends_on:
                  postgres:
                    condition: service_healthy
                healthcheck:
                  test:
                    - CMD-SHELL
                    - "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"
                  interval: 30s
                  timeout: 5s
                  retries: 5
                  start_period: 20s

            volumes:
              postgres_data:
            COMPOSE_EOF

            # Capture the DIGEST (content hash) of the currently-running
            # container's image. Using {{.Image}} instead of {{.Config.Image}}
            # returns the sha256 ID, which survives tag reassignment. That
            # matters because once we pull the new :latest, the old :latest
            # tag points at new bytes — we need to remember the old bytes
            # themselves so rollback can restore them.
            PREVIOUS_IMAGE_ID=$(docker inspect --format='{{.Image}}' \
              mudita-lms-web-1 2>/dev/null || echo "")
            echo "==> Previous image digest: ${PREVIOUS_IMAGE_ID:-<none>}"

            echo "==> Pulling ${{ env.IMAGE }}:${IMAGE_TAG}"
            docker pull ${{ env.IMAGE }}:${IMAGE_TAG}

            echo "==> Running prisma migrate deploy"
            docker run --rm \
              --network mudita-lms_default \
              --env-file .env \
              ${{ env.IMAGE }}:${IMAGE_TAG} \
              npx prisma migrate deploy

            echo "==> Force-recreating web container at ${IMAGE_TAG}"
            docker compose up -d --force-recreate --remove-orphans web

            echo "==> Waiting for /api/health to report ok"
            HEALTHY=0
            for i in $(seq 1 30); do
              if curl -fsS --max-time 3 http://127.0.0.1:3020/api/health \
                  | grep -q '"status":"ok"'; then
                HEALTHY=1
                echo "==> Health check passed on attempt $i"
                break
              fi
              sleep 2
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "!! Health check failed — rolling back"
              if [ -n "$PREVIOUS_IMAGE_ID" ]; then
                docker tag "$PREVIOUS_IMAGE_ID" ${{ env.IMAGE }}:rollback
                IMAGE_TAG=rollback docker compose up -d \
                  --force-recreate --remove-orphans web
              else
                echo "!! No previous image to roll back to"
              fi
              exit 1
            fi

            echo "==> Cleaning up dangling images"
            docker image prune -f
